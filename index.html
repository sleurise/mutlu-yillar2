<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Sevgilim!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e1e2f, #111119);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
            padding: 40px 0;
            box-sizing: border-box;
        }

        /* Arkadaki alanı yanlara doğru iyice büyüttük (850px yaptık, çok daha ferah) */
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 45px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 850px; 
            width: 95%;
            z-index: 10;
            transition: transform 0.3s;
        }

        .quote {
            font-style: italic;
            font-size: 1.1rem;
            color: #ff4a75;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 500;
        }

        h1 {
            color: #ffffff;
            font-size: 2.3rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 254, 254, 0.2);
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        /* 2 Sütunlu Düzen: Sol taraf 3 foto, Sağ taraf 3 foto */
        .foto-galeri {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Yan yana tam 2 eşit sütun */
            gap: 25px; /* Fotoğrafların arası açıldı, ferahladı */
            margin-top: 35px;
        }

        /* Her sütunun kendi içinde fotoğrafları alt alta dizmesi için sütun yapısı */
        .foto-sutun {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Alt alta duran fotoların arası */
        }

        .foto-galeri img {
            width: 100%;
            height: 200px; /* Fotoğrafların dikeyde ezilmemesi için ideal yükseklik */
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid rgba(255, 74, 117, 0.3);
            transition: all 0.3s ease;
        }

        .foto-galeri img:hover {
            transform: scale(1.03);
            border-color: #ff4a75;
            box-shadow: 0 5px 15px rgba(255, 74, 117, 0.3);
        }

        /* Kalp Animasyonları */
        .heart {
            position: absolute;
            color: #ff4a75;
            font-size: 20px;
            top: -10%;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
